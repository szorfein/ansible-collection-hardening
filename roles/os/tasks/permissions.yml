---
- name: Fix directory permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  with_items:
    - /boot
    - /usr/src
    - /usr/lib/modules
    - "{{ ansible_facts['user_dir'] }}"

- name: Find cron directories
  ansible.builtin.find:
    paths:
      - /etc
    patterns:
      - cron.daily
      - cron.hourly
      - cron.weekly
      - cron.monthly
      - cron.d
    file_type: directory
  register: cron_directories

- name: Set ownership of cron directories to 0700
  ansible.builtin.file:
    mode: "0700"
    path: "{{ item.path }}"
    state: directory
  loop: "{{ cron_directories.files }}"

- name: Find cron files
  ansible.builtin.find:
    paths:
      - /etc
    patterns:
      - crontab
      - cron.deny
    file_type: any
  register: cron_directories

- name: Set ownership of cron files to 0600
  ansible.builtin.file:
    mode: "0600"
    path: "{{ item.path }}"
  loop: "{{ cron_directories.files }}"

- name: Get all home directories in /home
  ansible.builtin.find:
    paths: /home/
    recurse: false
    file_type: directory
    excludes: "lost+found"
  register: home_directories

- name: Set ownership of /home directories to 0700
  ansible.builtin.file:
    mode: "0700"
    path: "{{ item.path }}"
    state: directory
  loop: "{{ home_directories.files }}"

- name: Get all /etc/sudoers.d files
  ansible.builtin.find:
    paths: /etc/sudoers.d
    recurse: false
    file_type: file
  register: sudoers

- name: Set ownership of /etc/sudoers.d/* to 0600
  ansible.builtin.file:
    mode: "0600"
    path: "{{ item.path }}"
  loop: "{{ sudoers.files }}"

- name: Set ownership of /etc/sudoers.d to 0750
  ansible.builtin.file:
    mode: "0750"
    path: /etc/sudoers.d
    state: directory
