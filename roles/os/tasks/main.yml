---
- name: Load OS-specific vars.
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_facts['os_family'] }}.yml"
        - main.yml
      paths:
        - "vars"

- name: Search for Grub
  ansible.builtin.shell: hash grub-mkconfig 2>/dev/null
  register: has_grub
  ignore_errors: true

# Also install headers
- ansible.builtin.import_tasks: kernel.yml
  become: true
  notify:
    - update-hardened-initrd
    - update-grub
  when: os_use_kernel_hardened | bool

# change option name os_fix_grub instead of os_fix_cmdline
- ansible.builtin.import_tasks: cmdline.yml
  become: true
  notify:
    - update-grub
  when: os_fix_grub | bool

# Block ICMP request
- ansible.builtin.import_tasks: sysctl.yml
  become: true
  when: os_fix_sysctl | bool

- ansible.builtin.import_tasks: audit.yml
  become: true
  when: os_fix_audit | bool

- ansible.builtin.import_tasks: secure-time-sync.yml
  become: true
  when: os_fix_ntp | bool

- ansible.builtin.import_tasks: cpu.yml
  become: true
  notify:
    - update-grub
  when: os_fix_cpu_microcode | bool

- ansible.builtin.import_tasks: modprobe.yml
  become: true
  notify:
    - update-initrd
    - update-hardened-initrd
  when: os_fix_modprobe | bool

- ansible.builtin.import_tasks: permissions.yml
  become: true
  when: os_fix_permissions | bool

- ansible.builtin.import_tasks: pam.yml
  become: true
  when: os_fix_pam | bool

- ansible.builtin.import_tasks: entropy.yml
  become: true
  when: os_fix_entropy | bool

- name: Hidepid
  become: true
  ansible.builtin.import_tasks: hidepid.yml
  when: os_fix_hidepid | bool

- ansible.builtin.import_tasks: core_dumps.yml
  become: true
  when: os_fix_core_dumps | bool

- name: Setting umask to {{ os_umask }}
  become: true
  ansible.builtin.import_tasks: umask.yml
  when: os_fix_umask | bool

- name: Securetty
  become: true
  ansible.builtin.template:
    src: securetty.j2
    dest: /etc/securetty
    owner: root
    group: root
    mode: "0400"
  when: os_fix_securetty | bool
